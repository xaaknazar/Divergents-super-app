name: CI

on:
  push:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # .npmrc sets legacy-peer-deps=true (Clerk + React 19), honored by npm ci.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
